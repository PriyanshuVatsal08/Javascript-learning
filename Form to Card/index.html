<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to card</title>
    <style>
        input {
            display: flex;
            padding: 10px;
        }

        #card {
            border: 3px solid black;
            height: fit-content;
            width: fit-content;
            padding: 30px;
        }

        #profile_div img {
            width: 100px;
            height: 100px;
            border-radius: 100%;
            border: 3px solid black;
        }

        #person_details {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <form action="">
        <input type="" placeholder="Profie">
        <input type="text" placeholder="Enter Name">
        <input type="text" placeholder="Enter Age">
        <input type="text" placeholder="Email">
        <input type="submit" id="submitt">
    </form>

    <div id="card">
        <div id="profile_div">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBeYtRmRs_LylsAAWCs75x9di-2y_ZA3UE5KYcIa_Jyg&s=10"
                alt="">
        </div>

        <div id="person_details">
            <p id="person_name">XYZ</p>
            <p id="person_age">XX</p>
            <p id="peraon_email">XYZ@gmail.com</p>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
