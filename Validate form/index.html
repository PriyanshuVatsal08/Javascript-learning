<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form>
            <div id="header">
                <p>Email & Password</p>
            </div>

            <div id="text_field">

            </div>
            <button>Login</button>

            <p id="Something is wrong">Error</p>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
